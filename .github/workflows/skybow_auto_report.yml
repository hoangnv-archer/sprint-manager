name: Skybow Auto Report

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 08:30 AM VN (Thứ 2 - Thứ 6)
     workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas requests streamlit streamlit-gsheets plotly
      - name: Run Skybow Only
        # Lệnh này chỉ kích hoạt gửi cho Skybow nhờ logic lọc ở bước 1
        run: python app.py --action skybow

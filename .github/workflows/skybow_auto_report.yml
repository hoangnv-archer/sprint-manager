name: Skybow Auto Report

on:
  schedule:
    # Chạy vào 08:30 sáng và 17:30 chiều (Giờ VN = Giờ UTC + 7)
    - cron: '30 0 * * *'  # 01:30 UTC là 08:30 AM VN
      workflow_dispatch:      # Cho phép bạn bấm nút chạy thử thủ công

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Report Script
        env:
          # Truyền các cấu hình secret nếu bạn dùng st.secrets
          # Ở đây code của bạn đã fix cứng ID trong PROJECTS nên không cần điền thêm ở đây
          STREAMLIT_GSHEETS_URL: ${{ secrets.GSHEETS_URL }}
        run: python app.py --action
